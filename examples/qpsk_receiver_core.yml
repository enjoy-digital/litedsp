# Complete QPSK receiver sentinel: decision-directed carrier recovery, 2-sample/symbol timing
# recovery, and hard QPSK decisions.  The output I/Q levels encode the decided quadrant; generate
# the standalone AXI-Stream + AXI-Lite core and register map with:
#
#   litedsp_gen examples/qpsk_receiver_core.yml --output-dir build/qpsk_receiver_core

name     : qpsk_receiver_core
csr_base : 0x0

flow:
  name       : qpsk_receiver
  data_width : 16
  clock_ns   : 10.0
  inputs     : [{id: samples_in, layout: iq}]
  outputs    : [{id: symbols_out, layout: iq_symbol}]
  blocks:
    - {id: carrier, type: carrier_loop,    params: {detector: qpsk, architecture: pipelined, kp_shift: 5, ki_shift: 13}}
    - {id: timing,  type: timing_recovery, params: {sps: 2, ted: mm, architecture: pipelined}}
    - {id: decide,  type: slicer,          params: {bits_per_axis: 1, spacing: 8192}}
  connections:
    - {from: samples_in,     to: carrier.sink}
    - {from: carrier.source, to: timing.sink}
    - {from: timing.source,  to: decide.sink}
    - {from: decide.source,  to: symbols_out}

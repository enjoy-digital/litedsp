<svg xmlns="http://www.w3.org/2000/svg" width="480" height="160" viewBox="0 0 480 160"
     font-family="Arial, Helvetica, sans-serif">
  <!-- LiteDSP logo, in the LiteX grayscale style: white card, gray outline, I/Q waveform motif. -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feOffset dx="1.5" dy="2.5" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="6" y="6" width="468" height="146" rx="10" fill="#ffffff" stroke="#595959"
        stroke-width="2" filter="url(#shadow)"/>
  <!-- I/Q waveform: solid I sine + dashed Q, quarter period (30px) apart -->
  <g fill="none" stroke-linecap="round">
    <path stroke="#595959" stroke-width="3" d="M 45 54
      C 60 24, 90 24, 105 54 S 150 84, 165 54 S 210 24, 225 54 S 270 84, 285 54
      S 330 24, 345 54 S 390 84, 405 54 S 450 24, 465 54"/>
    <path stroke="#9a9a9a" stroke-width="2.5" stroke-dasharray="1,6" d="M 75 54
      C 90 24, 120 24, 135 54 S 180 84, 195 54 S 240 24, 255 54 S 300 84, 315 54
      S 360 24, 375 54 S 420 84, 435 54"/>
  </g>
  <text x="234" y="124" text-anchor="end" font-size="42" font-weight="bold"
        fill="#000000">Lite</text>
  <text x="234" y="124" text-anchor="start" font-size="42" font-weight="bold"
        fill="#595959">DSP</text>
  <text x="240" y="144" text-anchor="middle" font-size="12.5"
        fill="#595959">Portable RF/DSP building blocks for FPGAs</text>
</svg>

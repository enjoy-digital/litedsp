name: Implementation (ECP5 synth)

# Portability + compile-clean check: synthesize every block with Yosys for ECP5.
# (nextpnr-ecp5 P&R and the Xilinx/Vivado flows run locally via impl/run.py.)

on:
  push:
  pull_request:

jobs:
  ecp5-synth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Yosys
        run: sudo apt-get update && sudo apt-get install -y yosys

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy
          pip install git+https://github.com/m-labs/migen.git
          pip install git+https://github.com/enjoy-digital/litex.git

      - name: Synthesize all blocks for ECP5
        run: python3 impl/run.py --device ecp5 --flow synth --no-gate

name: Implementation (Xilinx / Vivado)

# Vivado cannot run on GitHub-hosted runners. This opt-in workflow targets a Linux self-hosted
# runner labelled "vivado" with Vivado already licensed and available on PATH.

on:
  workflow_dispatch:

jobs:
  artix7:
    runs-on: [self-hosted, linux, vivado]
    timeout-minutes: 180
    env:
      LITEDSP_IMPL_BUILD: /tmp/litedsp_impl_${{ github.run_id }}_artix7
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy
          pip install git+https://github.com/m-labs/migen.git@4c2ae8dfeea37f235b52acb8166f12acaaae4f7c
          pip install git+https://github.com/enjoy-digital/litex.git

      - name: Check Vivado installation
        run: vivado -version

      - name: Synthesize all blocks for Artix-7
        run: python3 impl/run.py --device xilinx --flow synth --build "$LITEDSP_IMPL_BUILD"

      - name: Enforce closed Artix-7 timing targets
        run: python3 impl/run.py --device xilinx --flow pnr --target-closed --target-gate --build "$LITEDSP_IMPL_BUILD"

      - name: Sweep near-target native FFT routing on Artix-7
        run: python3 impl/run.py --device xilinx --flow pnr --module fft_parallel_native_x2 --strategies all --build "$LITEDSP_IMPL_BUILD"

      - name: Upload Artix-7 timing reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vivado-artix7-timing
          path: |
            ${{ env.LITEDSP_IMPL_BUILD }}/xilinx/**/*_vivado.log
            ${{ env.LITEDSP_IMPL_BUILD }}/xilinx/**/timing_summary.rpt
            ${{ env.LITEDSP_IMPL_BUILD }}/xilinx/**/timing_paths.rpt
          if-no-files-found: warn
          retention-days: 14

  artix-usplus:
    runs-on: [self-hosted, linux, vivado]
    timeout-minutes: 180
    env:
      LITEDSP_IMPL_BUILD: /tmp/litedsp_impl_${{ github.run_id }}_artix_usplus
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy
          pip install git+https://github.com/m-labs/migen.git@4c2ae8dfeea37f235b52acb8166f12acaaae4f7c
          pip install git+https://github.com/enjoy-digital/litex.git

      - name: Check Vivado installation
        run: vivado -version

      - name: Synthesize all blocks for Artix UltraScale+
        run: python3 impl/run.py --device xilinx_au --flow synth --build "$LITEDSP_IMPL_BUILD"

      - name: Enforce closed Artix UltraScale+ timing targets
        run: python3 impl/run.py --device xilinx_au --flow pnr --target-closed --target-gate --build "$LITEDSP_IMPL_BUILD"

      - name: Sweep native FFT routing on Artix UltraScale+
        run: python3 impl/run.py --device xilinx_au --flow pnr --module fft_parallel_native_x2 --strategies all --build "$LITEDSP_IMPL_BUILD"

      - name: Upload Artix UltraScale+ timing reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vivado-artix-usplus-timing
          path: |
            ${{ env.LITEDSP_IMPL_BUILD }}/xilinx_au/**/*_vivado.log
            ${{ env.LITEDSP_IMPL_BUILD }}/xilinx_au/**/timing_summary.rpt
            ${{ env.LITEDSP_IMPL_BUILD }}/xilinx_au/**/timing_paths.rpt
          if-no-files-found: warn
          retention-days: 14

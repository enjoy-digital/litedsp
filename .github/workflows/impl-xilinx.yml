name: Implementation (Xilinx / Vivado)

# Vivado cannot run on GitHub-hosted runners. This workflow targets a Linux self-hosted runner
# labelled "vivado" with Vivado already licensed and available on PATH. The weekly run packages
# and validates both generated IP examples; manual runs additionally execute the full block,
# strict-target, and route-stress campaigns.

on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 0"

concurrency:
  group: impl-xilinx-${{ github.ref }}
  cancel-in-progress: false

jobs:
  artix7:
    runs-on: [self-hosted, linux, vivado]
    timeout-minutes: 180
    env:
      LITEDSP_IMPL_BUILD: /tmp/litedsp_impl_${{ github.run_id }}_artix7
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pyyaml
          pip install git+https://github.com/m-labs/migen.git@4c2ae8dfeea37f235b52acb8166f12acaaae4f7c
          pip install git+https://github.com/enjoy-digital/litex.git

      - name: Check Vivado installation
        run: vivado -version

      - name: Package and validate generated IPs on Artix-7
        run: |
          python3 -m litedsp.gen examples/ddc_core.yml \
            --output-dir "$LITEDSP_IMPL_BUILD/ddc_ip" --vivado-ip --vivado-validate \
            --vivado-part xc7a200tsbg484-3
          python3 -m litedsp.gen examples/qpsk_receiver_core.yml \
            --output-dir "$LITEDSP_IMPL_BUILD/qpsk_receiver_ip" --vivado-ip --vivado-validate \
            --vivado-part xc7a200tsbg484-3

      - name: Synthesize all blocks for Artix-7
        if: github.event_name == 'workflow_dispatch'
        run: python3 impl/run.py --device xilinx --flow synth --build "$LITEDSP_IMPL_BUILD"

      - name: Enforce closed Artix-7 timing targets
        if: github.event_name == 'workflow_dispatch'
        run: python3 impl/run.py --device xilinx --flow pnr --target-closed --target-gate --build "$LITEDSP_IMPL_BUILD"

      - name: Sweep near-target native FFT routing on Artix-7
        if: github.event_name == 'workflow_dispatch'
        run: python3 impl/run.py --device xilinx --flow pnr --module fft_parallel_native_x2 --strategies all --build "$LITEDSP_IMPL_BUILD"

      - name: Sweep capacity/timing-stress routing on Artix-7
        if: github.event_name == 'workflow_dispatch'
        run: python3 impl/run.py --device xilinx --flow pnr --stress --strategies all --build "$LITEDSP_IMPL_BUILD"

      - name: Upload Artix-7 timing reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vivado-artix7-timing
          path: |
            ${{ env.LITEDSP_IMPL_BUILD }}/xilinx/**/*_vivado.log
            ${{ env.LITEDSP_IMPL_BUILD }}/xilinx/**/timing_summary.rpt
            ${{ env.LITEDSP_IMPL_BUILD }}/xilinx/**/timing_paths.rpt
            ${{ env.LITEDSP_IMPL_BUILD }}/ddc_ip/vivado_ip/component.xml
            ${{ env.LITEDSP_IMPL_BUILD }}/ddc_ip/vivado_ip/package_ip.log
            ${{ env.LITEDSP_IMPL_BUILD }}/ddc_ip/vivado_ip/validate_ip.log
            ${{ env.LITEDSP_IMPL_BUILD }}/ddc_ip/vivado_validation/utilization.rpt
            ${{ env.LITEDSP_IMPL_BUILD }}/qpsk_receiver_ip/vivado_ip/component.xml
            ${{ env.LITEDSP_IMPL_BUILD }}/qpsk_receiver_ip/vivado_ip/package_ip.log
            ${{ env.LITEDSP_IMPL_BUILD }}/qpsk_receiver_ip/vivado_ip/validate_ip.log
            ${{ env.LITEDSP_IMPL_BUILD }}/qpsk_receiver_ip/vivado_validation/utilization.rpt
          if-no-files-found: warn
          retention-days: 14

  artix-usplus:
    runs-on: [self-hosted, linux, vivado]
    timeout-minutes: 180
    env:
      LITEDSP_IMPL_BUILD: /tmp/litedsp_impl_${{ github.run_id }}_artix_usplus
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pyyaml
          pip install git+https://github.com/m-labs/migen.git@4c2ae8dfeea37f235b52acb8166f12acaaae4f7c
          pip install git+https://github.com/enjoy-digital/litex.git

      - name: Check Vivado installation
        run: vivado -version

      - name: Package and validate generated IPs on Artix UltraScale+
        run: |
          python3 -m litedsp.gen examples/ddc_core.yml \
            --output-dir "$LITEDSP_IMPL_BUILD/ddc_ip" --vivado-ip --vivado-validate \
            --vivado-part xcau20p-ffvb676-2-e
          python3 -m litedsp.gen examples/qpsk_receiver_core.yml \
            --output-dir "$LITEDSP_IMPL_BUILD/qpsk_receiver_ip" --vivado-ip --vivado-validate \
            --vivado-part xcau20p-ffvb676-2-e

      - name: Synthesize all blocks for Artix UltraScale+
        if: github.event_name == 'workflow_dispatch'
        run: python3 impl/run.py --device xilinx_au --flow synth --build "$LITEDSP_IMPL_BUILD"

      - name: Enforce closed Artix UltraScale+ timing targets
        if: github.event_name == 'workflow_dispatch'
        run: python3 impl/run.py --device xilinx_au --flow pnr --target-closed --target-gate --build "$LITEDSP_IMPL_BUILD"

      - name: Sweep native FFT routing on Artix UltraScale+
        if: github.event_name == 'workflow_dispatch'
        run: python3 impl/run.py --device xilinx_au --flow pnr --module fft_parallel_native_x2 --strategies all --build "$LITEDSP_IMPL_BUILD"

      - name: Sweep capacity/timing-stress routing on Artix UltraScale+
        if: github.event_name == 'workflow_dispatch'
        run: python3 impl/run.py --device xilinx_au --flow pnr --stress --strategies all --build "$LITEDSP_IMPL_BUILD"

      - name: Upload Artix UltraScale+ timing reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vivado-artix-usplus-timing
          path: |
            ${{ env.LITEDSP_IMPL_BUILD }}/xilinx_au/**/*_vivado.log
            ${{ env.LITEDSP_IMPL_BUILD }}/xilinx_au/**/timing_summary.rpt
            ${{ env.LITEDSP_IMPL_BUILD }}/xilinx_au/**/timing_paths.rpt
            ${{ env.LITEDSP_IMPL_BUILD }}/ddc_ip/vivado_ip/component.xml
            ${{ env.LITEDSP_IMPL_BUILD }}/ddc_ip/vivado_ip/package_ip.log
            ${{ env.LITEDSP_IMPL_BUILD }}/ddc_ip/vivado_ip/validate_ip.log
            ${{ env.LITEDSP_IMPL_BUILD }}/ddc_ip/vivado_validation/utilization.rpt
            ${{ env.LITEDSP_IMPL_BUILD }}/qpsk_receiver_ip/vivado_ip/component.xml
            ${{ env.LITEDSP_IMPL_BUILD }}/qpsk_receiver_ip/vivado_ip/package_ip.log
            ${{ env.LITEDSP_IMPL_BUILD }}/qpsk_receiver_ip/vivado_ip/validate_ip.log
            ${{ env.LITEDSP_IMPL_BUILD }}/qpsk_receiver_ip/vivado_validation/utilization.rpt
          if-no-files-found: warn
          retention-days: 14

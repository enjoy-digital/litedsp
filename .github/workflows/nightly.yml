name: nightly

# Deep verification: everything too slow or too random for the PR pipeline. Failures here
# gate the default branch's health badge, not merges.

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:

  # Full test suite across a seed matrix (LITEDSP_SEED rotates the randomized backpressure /
  # stimulus; failures print the seed for one-command reproduction).
  seeds:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        seed: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pyyaml
          pip install git+https://github.com/m-labs/migen.git@4c2ae8dfeea37f235b52acb8166f12acaaae4f7c
          pip install git+https://github.com/enjoy-digital/litex.git
          pip install git+https://github.com/enjoy-digital/litedram.git
          pip install git+https://github.com/enjoy-digital/liteeth.git

      - name: Full suite (seed ${{ matrix.seed }})
        run: LITEDSP_SEED=${{ matrix.seed }} python3 -m unittest discover -s test

  # Full Verilator co-simulation at multiple backpressure seeds.
  cosim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pyyaml
          pip install git+https://github.com/m-labs/migen.git@4c2ae8dfeea37f235b52acb8166f12acaaae4f7c
          pip install git+https://github.com/enjoy-digital/litex.git
          pip install git+https://github.com/enjoy-digital/litedram.git
          pip install git+https://github.com/enjoy-digital/liteeth.git

      - name: Co-simulation (3 backpressure seeds)
        run: |
          python3 sim/run_blocks.py --seed 1
          python3 sim/run_blocks.py --seed 2 --throttle 40 --ready-rate 60
          python3 sim/run_blocks.py --seed 3 --throttle 10 --ready-rate 90

  # Verilator line coverage of the co-simulation suite, gated at the reviewed baseline.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pyyaml
          pip install git+https://github.com/m-labs/migen.git@4c2ae8dfeea37f235b52acb8166f12acaaae4f7c
          pip install git+https://github.com/enjoy-digital/litex.git
          pip install git+https://github.com/enjoy-digital/litedram.git
          pip install git+https://github.com/enjoy-digital/liteeth.git

      - name: Line coverage (90% minimum)
        run: python3 sim/run_coverage.py --min 90

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: coverage-results
          path: coverage.json

  # Full characterization gate + rendered report artifact.
  char:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pyyaml
          pip install git+https://github.com/m-labs/migen.git@4c2ae8dfeea37f235b52acb8166f12acaaae4f7c
          pip install git+https://github.com/enjoy-digital/litex.git
          pip install git+https://github.com/enjoy-digital/litedram.git
          pip install git+https://github.com/enjoy-digital/liteeth.git

      - name: Characterization gate
        run: python3 char/run_char.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: char-results
          path: |
            char/results.json
            doc/characterization.md

  # Property-based constructor-space sampling at the deep profile.
  hypothesis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pyyaml hypothesis
          pip install git+https://github.com/m-labs/migen.git@4c2ae8dfeea37f235b52acb8166f12acaaae4f7c
          pip install git+https://github.com/enjoy-digital/litex.git
          pip install git+https://github.com/enjoy-digital/litedram.git
          pip install git+https://github.com/enjoy-digital/liteeth.git

      - name: Hypothesis (nightly profile)
        run: |
          HYPOTHESIS_PROFILE=nightly LITEDSP_HYPOTHESIS_EXAMPLES=100 \
            python3 -m unittest test.test_hypothesis

  # SymbiYosys formal verification of the stream-protocol properties of the plumbing blocks
  # (stability, token conservation — no loss/duplication under arbitrary backpressure, covers).
  formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OSS CAD Suite (yosys/sby)
        uses: YosysHQ/setup-oss-cad-suite@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: "2025-06-25"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pyyaml
          pip install git+https://github.com/m-labs/migen.git@4c2ae8dfeea37f235b52acb8166f12acaaae4f7c
          pip install git+https://github.com/enjoy-digital/litex.git
          pip install git+https://github.com/enjoy-digital/litedram.git
          pip install git+https://github.com/enjoy-digital/liteeth.git

      - name: Formal suite (all plumbing blocks)
        run: python3 formal/run_formal.py

  # Full-registry ECP5 synthesis + budget gate (the PR pipeline runs a subset).
  impl-deep:
    runs-on: ubuntu-latest
    env:
      LITEDSP_IMPL_BUILD: /tmp/litedsp_impl_${{ github.run_id }}_nightly_ecp5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OSS CAD Suite (yosys/nextpnr)
        uses: YosysHQ/setup-oss-cad-suite@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: "2025-06-25"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pyyaml
          pip install git+https://github.com/m-labs/migen.git@4c2ae8dfeea37f235b52acb8166f12acaaae4f7c
          pip install git+https://github.com/enjoy-digital/litex.git
          pip install git+https://github.com/enjoy-digital/litedram.git
          pip install git+https://github.com/enjoy-digital/liteeth.git

      - name: Full-registry synth + budget gate
        run: python3 impl/run.py --device ecp5 --flow synth --build "$LITEDSP_IMPL_BUILD"

      - name: P&R subset (budgets + closed timing targets)
        run: python3 impl/run.py --device ecp5 --flow pnr --subset --closed-target-gate --build "$LITEDSP_IMPL_BUILD"

      - name: Three-route median for route-sensitive closed targets
        run: |
          python3 impl/run.py --device ecp5 --flow pnr --stability --repeat 3 \
            --target-gate --build "$LITEDSP_IMPL_BUILD"

      - name: Three-route stability for closest closed targets
        run: |
          python3 impl/run.py --device ecp5 --flow pnr --module viterbi_decoder --repeat 3 --target-gate --build "$LITEDSP_IMPL_BUILD"
          python3 impl/run.py --device ecp5 --flow pnr --module duc --repeat 3 --target-gate --build "$LITEDSP_IMPL_BUILD"

      - name: Upload nightly implementation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecp5-nightly-pnr-reports
          path: |
            ${{ env.LITEDSP_IMPL_BUILD }}/ecp5/**/*_ecp5_synth.log
            ${{ env.LITEDSP_IMPL_BUILD }}/ecp5/**/*_ecp5_pnr*.log
            ${{ env.LITEDSP_IMPL_BUILD }}/ecp5/**/*.cfg
          if-no-files-found: warn
          retention-days: 14

  # The native x4 FFT sits near the ECP5 capacity cliff. Route it independently with a long bound
  # so it cannot starve the regular implementation matrix.
  impl-stress:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        module: [fft_parallel_native_x4]
    env:
      LITEDSP_IMPL_BUILD: /tmp/litedsp_impl_${{ github.run_id }}_nightly_${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OSS CAD Suite (yosys/nextpnr)
        uses: YosysHQ/setup-oss-cad-suite@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: "2025-06-25"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pyyaml
          pip install git+https://github.com/m-labs/migen.git@4c2ae8dfeea37f235b52acb8166f12acaaae4f7c
          pip install git+https://github.com/enjoy-digital/litex.git

      - name: Route ${{ matrix.module }} with the stress timeout
        run: |
          python3 impl/run.py --device ecp5 --flow pnr --module "${{ matrix.module }}" \
            --pnr-timeout 5400 --build "$LITEDSP_IMPL_BUILD"

      - name: Upload ${{ matrix.module }} implementation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecp5-stress-${{ matrix.module }}-reports
          path: |
            ${{ env.LITEDSP_IMPL_BUILD }}/ecp5/**/*_ecp5_synth.log
            ${{ env.LITEDSP_IMPL_BUILD }}/ecp5/**/*_ecp5_pnr*.log
            ${{ env.LITEDSP_IMPL_BUILD }}/ecp5/**/*.cfg
          if-no-files-found: warn
          retention-days: 14

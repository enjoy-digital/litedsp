name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false                # One shard's failure should not mask the others.
      matrix:
        python-version: ["3.9", "3.11"]
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Verilator (for the HDL co-simulation tests)
        run: sudo apt-get update && sudo apt-get install -y verilator

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pyyaml
          # Migen + LiteX (gateware framework).
          pip install git+https://github.com/m-labs/migen.git@4c2ae8dfeea37f235b52acb8166f12acaaae4f7c
          pip install git+https://github.com/enjoy-digital/litex.git
          # Ecosystem cores exercised by the integration tests (DMA backends, UDP streamers).
          pip install git+https://github.com/enjoy-digital/litedram.git
          pip install git+https://github.com/enjoy-digital/liteeth.git

      - name: Run test suite (shard ${{ matrix.shard }}/4)
        run: |
          tests=$(ls test/test_*.py | awk "NR % 4 == ${{ matrix.shard }}" \
                  | sed 's|/|.|; s|\.py$||')
          echo "shard tests: $tests"
          python -m unittest $tests -v

  verilator:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pyyaml
          pip install git+https://github.com/m-labs/migen.git@4c2ae8dfeea37f235b52acb8166f12acaaae4f7c
          pip install git+https://github.com/enjoy-digital/litex.git

      - name: Verilator lint (all registry blocks)
        run: python3 sim/run_lint.py

      - name: Verilator co-simulation (golden models)
        run: |
          python3 sim/run_blocks.py
          python3 sim/run_nco.py
          python3 sim/run_fir.py

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pyyaml
          pip install git+https://github.com/m-labs/migen.git@4c2ae8dfeea37f235b52acb8166f12acaaae4f7c
          pip install git+https://github.com/enjoy-digital/litex.git
          pip install git+https://github.com/enjoy-digital/litedram.git
          pip install git+https://github.com/enjoy-digital/liteeth.git

      - name: Check generated docs are in sync
        run: |
          python3 -m litedsp.flow.docgen --check
          python3 impl/report.py --check
          python3 char/run_char.py --check-report

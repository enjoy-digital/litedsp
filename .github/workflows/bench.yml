name: Bench (SoC elaboration)

# Integration check: elaborate the bench SoCs (LiteDSP chain + SoCMini + UARTBone on
# litex-boards platforms) down to Verilog for every supported board. Toolchain P&R runs
# locally (--build); this catches LiteX/litex-boards API drift and CSR-map regressions.

on:
  push:
  pull_request:

jobs:
  bench-elaborate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pyyaml
          pip install git+https://github.com/m-labs/migen.git
          pip install git+https://github.com/enjoy-digital/litex.git
          pip install git+https://github.com/litex-hub/litex-boards.git
          pip install -e .

      - name: Elaborate bench SoCs
        run: |
          for board in arty colorlight_5a_75b; do
            (cd $(mktemp -d) && python3 $GITHUB_WORKSPACE/bench/spectrum.py --board=$board)
          done

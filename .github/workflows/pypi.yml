name: PyPI

# Publishes to PyPI on version tags (e.g. v2026.07) or manual dispatch, via PyPI trusted
# publishing (OIDC — configure the publisher once at
# https://pypi.org/manage/account/publishing/: repository enjoy-digital/litedsp,
# workflow pypi.yml, environment pypi). No API token secrets needed.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine "packaging>=24.2"
          python -m build
          python -m twine check dist/*
          python -m venv /tmp/litedsp-wheel-smoke
          /tmp/litedsp-wheel-smoke/bin/pip install --no-deps dist/*.whl

      - name: Smoke-test the installed wheel
        working-directory: /tmp
        run: |
          /tmp/litedsp-wheel-smoke/bin/python -c 'import litedsp; from importlib.metadata import entry_points, version; from importlib.resources import files; assert tuple(map(int, version("litedsp").split("."))) == tuple(map(int, litedsp.__version__.split("."))); assert {"litedsp_gen", "litedsp_flow", "litedsp_gui", "litedsp_cli"} <= {e.name for e in entry_points(group="console_scripts")}; assert files("litedsp.flow").joinpath("examples/ddc.json").is_file()'

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
